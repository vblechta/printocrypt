name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore PrintoCrypt.sln

      - name: Build
        run: dotnet build PrintoCrypt.sln -c Release --no-restore

      - name: Publish
        run: dotnet publish src/PrintoCrypt.App/PrintoCrypt.App.csproj -c Release -r win-x64 --self-contained false -o artifacts/PrintoCrypt

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer package
        run: powershell -ExecutionPolicy Bypass -File scripts/Build-Installer.ps1 -OutputDir artifacts/PrintoCrypt-Setup

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PrintoCrypt-win-x64
          path: |
            artifacts/PrintoCrypt-Setup
            artifacts/PrintoCrypt-Setup.zip
            artifacts/PrintoCrypt-Setup.exe
